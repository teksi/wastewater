name: 🐘 Datamodel | Tests

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
    paths:
      - datamodel/**
      - '.github/workflows/datamodel-test.yml'
  pull_request:
    branches:
      - main
    paths:
      - datamodel/**
      - '.github/workflows/datamodel-test.yml'
  workflow_dispatch:


jobs:
  version-tests:
    uses: opengisch/oqtopus/.github/workflows/reusable-datamodel-version-check.yml@main
    secrets: inherit

  datamodel-tests:
    name: Run unit tests on datamodel
    runs-on: ubuntu-latest

    env:
      DEMO_DATA: Aletsch
      PGSERVICE: pg_tww
      DB_NAME: tww
      RUN_TESTS: True

    strategy:
      fail-fast: false
      matrix:
        include:
        - modification_ci: false
          modification_agxx: false
          webgis: false
          srid: 2056

        - modification_ci: true
          modification_agxx: false
          webgis: false
          srid: 2056

        - modification_ci: false
          modification_agxx: true
          webgis: false
          srid: 2056

        - modification_ci: false
          modification_agxx: false
          webgis: true
          srid: 2056

        - modification_ci: false
          modification_agxx: false
          webgis: false
          srid: 21781

    steps:
      - uses: actions/checkout@v6

      - name: Initialize container
        run: |
          docker compose up --build -d
          until docker compose exec db pg_isready -U postgres; do
            echo "Waiting for PostgreSQL to be ready..."
            sleep 2
          done
          # create the database
          docker compose exec db createdb -U postgres ${DB_NAME}
          docker compose run pum \
              -vvv -p ${PGSERVICE} -d datamodel install \
              -p modification_ci ${{ matrix.modification_ci}} \
              -p modification_agxx ${{ matrix.modification_agxx}} \
              -p webgis ${{ matrix.webgis}} \
              -p SRID ${{ matrix.srid }}

      - name: Run tests
        if: matrix.srid == 2056
        run:  docker compose run --entrypoint pytest pum datamodel

      - name: Docker logs
        if: failure()
        run: docker compose logs pum

  static-tests:
    name: Run static tests on datamodel
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - run: ./datamodel/test/static_tests.sh

name: 🌎 Update project translations and package project

concurrency:
  group: project-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name != 'workflow_call' }}

on:
  push:
    branches:
      - main
    paths:
      - project/**
      - '.github/workflows/project-translation-package.yml'
  pull_request:
    branches:
      - main
    paths:
      - project/**
      - '.github/workflows/project-translation-package.yml'
  schedule:
    - cron: "30 04 * * *"
  workflow_dispatch:
  workflow_call:
    inputs:
      release_tag:
        required: false
        description: 'Release tag to upload project translations as GitHub Release asset'
        default: ''
        type: string

jobs:
  project-translation-package:
    uses: opengisch/oqtopus/.github/workflows/reusable-project-translation-package.yml@main
    with:
      module_name: tww
      qgs_project_file: teksi_wastewater
      qgs_project_title: TWW
      pgservice: pg_tww
      db_name: tww
      release_tag: ${{ inputs.release_tag }}
    secrets: inherit

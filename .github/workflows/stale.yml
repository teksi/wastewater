name: 👓 Handle stale issues
on:
  schedule:
  - cron: "30 2 * * *"

permissions:
  contents: read

jobs:
  stale:
    permissions:
      issues: write  # for actions/stale to close stale issues
      pull-requests: write  # for actions/stale to close stale PRs
    if: github.repository_owner == 'teksi'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/stale@v10
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}

        # only unassigned issues
        exempt-issue-assignees: '*'

          # mark only, do not close
        days-before-issue-stale: 14
        days-before-issue-close: -1
        remove-stale-when-updated: false
        enable-statistics: false
        stale-issue-label: 'stale'

        # do not touch PRs
        days-before-pr-stale: -1
        days-before-pr-close: -1

        stale-issue-message: >
          The TEKSI project highly values your report and would love to see it addressed.
          However, this issue has been left in feedback mode for the last 14 days and is
          being automatically marked as "stale".

          If you would like to continue with this issue, please contact a certified service
          provider (see https://www.teksi.ch/modules/#prestataires) who will contact you
          for a service contract. If you could resolve the issue yourself meanwhile,
          please leave a note for future readers with the same problem and close the issue.

          In case you should have any uncertainty, please leave a comment and we will be
          happy to help you proceed with this issue.

        only-issue-labels: 'TEKSI Support'
        operations-per-run: 20


  stale-enhancements:
    permissions:
      issues: write
    if: github.repository_owner == 'teksi'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          # only unassigned issues
          exempt-issue-assignees: '*'

          # mark only, do not close
          days-before-issue-stale: 14
          days-before-issue-close: -1
          remove-stale-when-updated: false
          enable-statistics: false
          stale-issue-label: 'stale'

          # do not touch PRs
          days-before-pr-stale: -1
          days-before-pr-close: -1

          # only enhancements
          only-issue-labels: 'enhancement'
          operations-per-run: 20

          stale-issue-message: >
            Thank you for your enhancement suggestion. We appreciate your contribution.

            The TEKSI project follows a structured development process. To move forward with
            this enhancement, we ask you to work with a certified service provider to define
            a proper requirements document aligned with our processes.

            You can find certified service providers here:
            https://www.teksi.ch/modules/#prestataires

            Once a requirements specification is available, the enhancement can be properly
            evaluated and planned.

            If you have further questions, feel free to leave a comment and we will gladly assist.
